[build]
  publish = "frontend"

# ─── Fix path /frontend/* → /* (các link trong HTML dùng prefix /frontend/) ──
[[redirects]]
  from = "/frontend/brand/*"
  to = "/brand/:splat"
  status = 301

[[redirects]]
  from = "/frontend/*"
  to = "/:splat"
  status = 301

# ─── Page routes ────────────────────────────────────────────
[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/register"
  to = "/register.html"
  status = 200

[[redirects]]
  from = "/forgot-password"
  to = "/forgot_password.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/reset_password.html"
  status = 200

[[redirects]]
  from = "/profile"
  to = "/profile.html"
  status = 200

[[redirects]]
  from = "/history"
  to = "/history.html"
  status = 200

[[redirects]]
  from = "/stats"
  to = "/stats.html"
  status = 200

# ─── Proxy API sang Flask backend (Render) ──────────────────
[[redirects]]
  from = "/api/*"
  to = "https://prescription-ocr-project-2.onrender.com/api/:splat"
  status = 200
  force = true

# ─── Proxy uploads (avatar, ...) sang Flask backend ─────────
[[redirects]]
  from = "/uploads/*"
  to = "https://prescription-ocr-project-2.onrender.com/uploads/:splat"
  status = 200
  force = true

# ─── Headers bảo mật ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
