# ============================================================
# netlify.toml - Cấu hình Netlify cho Prescription OCR Project
# ============================================================
# HƯỚNG DẪN:
# 1. Deploy Flask backend lên Render.com (dùng render.yaml đã có sẵn)
# 2. Sau khi Render cấp URL (vd: https://prescription-ocr-backend.onrender.com),
#    thay "prescription-ocr-backend" bên dưới bằng URL thật của bạn
# 3. Commit & push lại để Netlify tự động redeploy
# ============================================================

[build]
  # Dùng thư mục gốc làm publish directory để các path như
  # /frontend/brand/favicon.svg hoạt động đúng
  publish = "."
  # Không cần build command vì đây là static HTML
  command = ""

# ─── Trang chính ────────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/frontend/index.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/frontend/login.html"
  status = 200

[[redirects]]
  from = "/register"
  to = "/frontend/register.html"
  status = 200

[[redirects]]
  from = "/forgot-password"
  to = "/frontend/forgot_password.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/frontend/reset_password.html"
  status = 200

[[redirects]]
  from = "/profile"
  to = "/frontend/profile.html"
  status = 200

[[redirects]]
  from = "/history"
  to = "/frontend/history.html"
  status = 200

[[redirects]]
  from = "/stats"
  to = "/frontend/stats.html"
  status = 200

# ─── Proxy API sang Flask backend (Render) ──────────────────
[[redirects]]
  from = "/api/*"
  to = "https://prescription-ocr-project-2.onrender.com/api/:splat"
  status = 200
  force = true

# ─── Proxy uploads (avatar, ...) sang Flask backend ─────────
[[redirects]]
  from = "/uploads/*"
  to = "https://prescription-ocr-project-2.onrender.com/uploads/:splat"
  status = 200
  force = true

# ─── Headers bảo mật ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
