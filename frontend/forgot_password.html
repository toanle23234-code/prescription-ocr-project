<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Trợ Lý Y Tế AI</title>
    <link rel="icon" type="image/svg+xml" href="/frontend/brand/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Plus Jakarta Sans", sans-serif; background: #0f172a; color: white; overflow-x: hidden; min-height: 100vh; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.62); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .input-glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.12); color: white; transition: all 0.3s ease; }
        .input-glass:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); outline: none; }
    </style>
</head>
<body class="flex items-center justify-center">
    <div id="canvas-container"></div>
    <div class="absolute top-6 left-6 z-10">
        <a href="/login" class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span>Về đăng nhập</span>
        </a>
    </div>

    <div class="max-w-md w-full mx-4 glass-panel rounded-2xl shadow-2xl overflow-hidden relative z-10" id="forgot-box">
        <div class="px-8 pt-8 pb-7">
            <div class="flex justify-center mb-6">
                <img src="/frontend/brand/favicon.svg" alt="Logo" class="w-16 h-16 rounded-2xl shadow-lg">
            </div>
            <h2 class="text-2xl font-bold text-center mb-2">Quên mật khẩu</h2>
            <p class="text-slate-400 text-sm text-center mb-8">Nhập email để nhận mã OTP đặt lại mật khẩu</p>

            <form class="space-y-4" onsubmit="event.preventDefault(); handleForgotPassword();">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Email tài khoản</label>
                    <div class="relative">
                        <i data-lucide="mail" class="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="email" id="forgot-email" class="w-full input-glass rounded-xl py-3 pl-10 pr-4" placeholder="nhapemail@example.com">
                    </div>
                </div>

                <div id="otp-block" class="hidden">
                    <label class="block text-sm font-medium text-slate-300 mb-1">Mã OTP</label>
                    <div class="relative">
                        <i data-lucide="shield-check" class="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="text" id="forgot-otp" maxlength="6" class="w-full input-glass rounded-xl py-3 pl-10 pr-4 tracking-[0.2em]" placeholder="Nhập 6 số OTP">
                    </div>
                </div>

                <button id="send-otp-btn" type="button" onclick="handleForgotPassword()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-blue-500/25 mt-4 border border-blue-400/20">
                    Gửi mã OTP
                </button>

                <button id="test-smtp-btn" type="button" onclick="handleTestSmtp()" class="w-full bg-slate-700/70 hover:bg-slate-600/80 text-slate-100 font-medium py-2.5 rounded-xl transition-all border border-slate-500/30">
                    Kiểm tra SMTP
                </button>

                <button id="verify-otp-btn" type="button" onclick="handleVerifyOtp()" class="hidden w-full bg-gradient-to-r from-emerald-600 to-cyan-600 hover:from-emerald-500 hover:to-cyan-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-emerald-500/25 border border-emerald-400/20">
                    Xác thực OTP
                </button>
            </form>

            <p id="forgot-message" class="hidden mt-5 text-sm text-emerald-300 bg-emerald-500/10 border border-emerald-400/30 rounded-xl px-4 py-3"></p>
            <div id="dev-otp-box" class="hidden mt-3 rounded-xl border border-amber-400/35 bg-amber-500/10 px-4 py-3">
                <p class="text-xs text-amber-200 font-semibold">OTP fallback (môi trường local/dev)</p>
                <p class="text-2xl tracking-[0.25em] font-bold text-amber-100 mt-1" id="dev-otp-value">------</p>
                <p class="text-[11px] text-amber-200/90 mt-1">Dùng mã này để xác thực OTP khi email chưa gửi được.</p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        document.getElementById("canvas-container").appendChild(canvas);
        let width, height, particles;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
                this.radius = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(59, 130, 246, 0.5)";
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const numParticles = Math.floor((width * height) / 15000);
            for (let i = 0; i < numParticles; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(59, 130, 246, ${1 - dist / 150})`;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            particles.forEach((p) => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function showMessage(message, ok = true) {
            const box = document.getElementById('forgot-message');
            box.textContent = message;
            box.classList.remove('hidden');
            box.className = ok
                ? 'mt-5 text-sm text-emerald-300 bg-emerald-500/10 border border-emerald-400/30 rounded-xl px-4 py-3'
                : 'mt-5 text-sm text-red-200 bg-red-500/10 border border-red-400/30 rounded-xl px-4 py-3';
        }

        function hideDevOtpBox() {
            const otpBox = document.getElementById('dev-otp-box');
            const otpValue = document.getElementById('dev-otp-value');
            otpValue.textContent = '------';
            otpBox.classList.add('hidden');
        }

        function showDevOtpBox(otp) {
            const otpBox = document.getElementById('dev-otp-box');
            const otpValue = document.getElementById('dev-otp-value');
            otpValue.textContent = String(otp || '------');
            otpBox.classList.remove('hidden');
        }

        let otpSent = false;

        async function handleTestSmtp() {
            const email = (document.getElementById('forgot-email').value || '').trim();
            if (!email) {
                showMessage('Vui lòng nhập email để kiểm tra SMTP.', false);
                return;
            }

            try {
                const response = await fetch('/api/test-smtp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (!response.ok || !data.success) {
                    showMessage(data.error || 'Kiểm tra SMTP thất bại.', false);
                    return;
                }
                showMessage(data.message || 'SMTP hoạt động bình thường.', true);
            } catch (err) {
                showMessage('Lỗi kết nối đến máy chủ khi kiểm tra SMTP.', false);
            }
        }

        async function handleForgotPassword() {
            const email = (document.getElementById('forgot-email').value || '').trim();
            if (!email) {
                showMessage('Vui lòng nhập email tài khoản.', false);
                return;
            }

            hideDevOtpBox();

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (!response.ok || !data.success) {
                    showMessage(data.error || 'Không thể gửi mã OTP.', false);
                    return;
                }

                otpSent = true;
                document.getElementById('otp-block').classList.remove('hidden');
                document.getElementById('verify-otp-btn').classList.remove('hidden');
                document.getElementById('send-otp-btn').textContent = 'Gửi lại mã OTP';
                document.getElementById('forgot-email').setAttribute('readonly', 'readonly');
                document.getElementById('forgot-otp').focus();
                showMessage(data.message || 'Mã OTP đã được gửi về email.');

                if (data.otpDelivery === 'dev-fallback' && data.devOtp) {
                    showDevOtpBox(data.devOtp);
                    document.getElementById('forgot-otp').value = String(data.devOtp);
                    if (data.warning) {
                        showMessage((data.message || 'Đã bật OTP fallback.') + ' ' + data.warning, true);
                    }
                }
            } catch (err) {
                showMessage('Lỗi kết nối đến máy chủ. Vui lòng thử lại.', false);
            }
        }

        async function handleVerifyOtp() {
            const email = (document.getElementById('forgot-email').value || '').trim();
            const otp = (document.getElementById('forgot-otp').value || '').trim();

            if (!otpSent) {
                showMessage('Vui lòng gửi mã OTP trước.', false);
                return;
            }

            if (!/^\d{6}$/.test(otp)) {
                showMessage('Mã OTP phải gồm đúng 6 chữ số.', false);
                return;
            }

            try {
                const response = await fetch('/api/verify-reset-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await response.json();
                if (!response.ok || !data.success) {
                    showMessage(data.error || 'Xác thực OTP thất bại.', false);
                    return;
                }

                showMessage(data.message || 'Xác thực OTP thành công. Đang chuyển trang...', true);
                if (data.resetPath) {
                    setTimeout(() => {
                        window.location.href = data.resetPath;
                    }, 600);
                }
            } catch (err) {
                showMessage('Lỗi kết nối đến máy chủ. Vui lòng thử lại.', false);
            }
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
        gsap.from('#forgot-box', { y: 30, opacity: 0, duration: 0.8, ease: 'power3.out' });
    </script>
</body>
</html>
