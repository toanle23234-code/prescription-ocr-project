<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <g transform="translate(32,32) rotate(-45)">
    <!-- Top half (red) - chubby capsule -->
    <rect x="-11" y="-18" width="22" height="19" rx="11" fill="#ef4444"/>
    <rect x="-11" y="-4" width="22" height="5" fill="#ef4444"/>
    <!-- Bottom half (yellow) -->
    <rect x="-11" y="-1" width="22" height="19" rx="11" fill="#fbbf24"/>
    <rect x="-11" y="-1" width="22" height="5" fill="#fbbf24"/>
    <!-- Divider -->
    <line x1="-11" y1="0.5" x2="11" y2="0.5" stroke="rgba(255,255,255,0.35)" stroke-width="0.7"/>
    <!-- Shine highlight -->
    <ellipse cx="-4" cy="-6" rx="3" ry="10" fill="rgba(255,255,255,0.18)"/>
  </g>
</svg>
