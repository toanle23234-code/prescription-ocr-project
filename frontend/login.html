<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Trợ Lý Y Tế AI</title>
    <link rel="icon" type="image/svg+xml" href="/frontend/brand/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        // Google Sign-In requires 'localhost', not '127.0.0.1'
        if (location.hostname === '127.0.0.1') {
            location.replace(location.href.replace('127.0.0.1', 'localhost'));
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Plus Jakarta Sans", sans-serif; background: #0f172a; color: white; overflow-x: hidden; min-height: 100vh; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s ease; }
        .input-glass:hover { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 12px rgba(99,102,241,0.2); }
        .input-glass:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); outline: none; }
        button[type="button"]:hover, button[type="submit"]:hover { box-shadow: 0 0 20px rgba(59,130,246,0.4); }
        a:hover { text-shadow: 0 0 8px rgba(96,165,250,0.5); }
        label:has(input[type="checkbox"]):hover { text-shadow: 0 0 6px rgba(148,163,184,0.4); }
        .logo-glow { transition: filter 0.3s ease, transform 0.3s ease; cursor: pointer; }
        .logo-glow:hover { filter: drop-shadow(0 0 14px rgba(99,102,241,0.7)); transform: scale(1.08); }
        .logo-glow:active { filter: drop-shadow(0 0 20px rgba(59,130,246,0.9)) brightness(1.2); transform: scale(0.96); }
    </style>
</head>
<body class="flex items-center justify-center">
    <div id="canvas-container"></div>
    <div class="absolute top-6 left-6 z-10">
        <a href="/" class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span>Về trang chủ</span>
        </a>
    </div>
    <div class="max-w-md w-full mx-4 glass-panel rounded-2xl shadow-2xl overflow-hidden relative z-10" id="auth-box">
        <div class="px-8 pt-8 pb-6">
            <div class="flex justify-center mb-6">
                <img src="/frontend/brand/favicon.svg" alt="Logo" class="w-16 h-16 rounded-2xl shadow-lg logo-glow">
            </div>
            <h2 class="text-2xl font-bold text-center mb-2">Chào mừng trở lại</h2>
            <p class="text-slate-400 text-sm text-center mb-8">Đăng nhập để quản lý lịch sử đơn thuốc</p>
            <form id="login-form" class="space-y-4" onsubmit="event.preventDefault();">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                    <div class="relative">
                        <i data-lucide="mail" class="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="email" id="login-email" class="w-full input-glass rounded-xl py-3 pl-10 pr-4" placeholder="nhapemail@example.com">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Mật khẩu</label>
                    <div class="relative">
                        <i data-lucide="lock" class="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="password" id="login-password" class="w-full input-glass rounded-xl py-3 pl-10 pr-10" placeholder="">
                        <button type="button" onclick="togglePassword('login-password', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-400 transition-colors" tabindex="-1">
                            <i data-lucide="eye-off" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between text-sm mt-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded bg-slate-800 border-slate-600 text-blue-500 focus:ring-blue-500 focus:ring-offset-slate-900">
                        <span class="text-slate-400">Ghi nhớ</span>
                    </label>
                    <a href="/forgot-password" class="text-blue-400 hover:text-blue-300">Quên mật khẩu?</a>
                </div>
                <button type="button" onclick="handleLogin()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-blue-500/25 mt-6 border border-blue-400/20">
                    Đăng nhập
                </button>

                <div class="relative my-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-700/80"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase tracking-wider">
                        <span class="px-3 bg-slate-900/70 text-slate-400 rounded">Hoặc</span>
                    </div>
                </div>

                <div id="google-login-wrap" class="w-full flex justify-center">
                    <div id="google-signin-button" class="flex justify-center"></div>
                </div>
                <p id="google-login-hint" class="text-center text-xs text-slate-400 mt-2 hidden"></p>

                <p class="text-center text-sm text-slate-400 mt-4">
                    Chưa có tài khoản?
                    <a href="/register" class="text-blue-400 hover:underline font-semibold">Đăng ký</a>
                </p>
            </form>
        </div>
    </div>
    <div id="success-toast" style="display:none;" class="fixed inset-0 flex items-center justify-center z-50">
        <div class="glass-panel rounded-2xl px-8 py-6 shadow-2xl border border-blue-400/30 bg-gradient-to-br from-blue-600/80 to-indigo-600/80 text-white text-center text-lg font-semibold animate__animated animate__fadeInDown">
            <span id="success-toast-message"></span>
        </div>
    </div>
    <div id="login-error-modal" style="display:none;" class="fixed inset-0 z-50 bg-slate-950/55 backdrop-blur-[2px] flex items-center justify-center p-4">
        <div id="login-error-card" class="w-full max-w-md rounded-2xl border border-red-300/40 bg-slate-900/95 shadow-2xl p-6">
            <div class="flex items-start gap-3">
                <div class="w-11 h-11 rounded-xl bg-red-500/20 border border-red-300/40 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="alert-triangle" class="w-5 h-5 text-red-300"></i>
                </div>
                <div class="min-w-0">
                    <h3 class="text-lg font-bold text-white">Đăng nhập thất bại</h3>
                    <p id="login-error-message" class="text-sm text-red-100/90 mt-1 leading-relaxed"></p>
                </div>
            </div>
            <div class="mt-5 flex justify-end">
                <button id="login-error-ok" type="button" class="px-5 py-2.5 rounded-xl bg-red-500 hover:bg-red-400 text-white font-semibold transition-all">Đăng nhập lại</button>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            btn.innerHTML = isHidden
                ? '<i data-lucide="eye" class="w-5 h-5"></i>'
                : '<i data-lucide="eye-off" class="w-5 h-5"></i>';
            lucide.createIcons({ nodes: [btn] });
        }

        // Canvas animation (Neural Network background)
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        document.getElementById("canvas-container").appendChild(canvas);
        let width, height, particles;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
                this.radius = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(59, 130, 246, 0.5)";
                ctx.fill();
            }
        }
        function initParticles() {
            particles = [];
            const numParticles = Math.floor((width * height) / 15000);
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(59, 130, 246, ${1 - dist / 150})`;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener("resize", resize);
        resize();
        animate();
        gsap.from("#auth-box", { y: 30, opacity: 0, duration: 0.8, ease: "power3.out" });
        function showSuccessToast(message, callback) {
            const toast = document.getElementById('success-toast');
            const msg = document.getElementById('success-toast-message');
            msg.textContent = message;
            toast.style.display = 'flex';
            setTimeout(() => {
                toast.style.display = 'none';
                if (callback) callback();
            }, 1800);
        }

        function showLoginErrorModal(message) {
            const modal = document.getElementById('login-error-modal');
            const card = document.getElementById('login-error-card');
            const msg = document.getElementById('login-error-message');
            msg.textContent = message;
            modal.style.display = 'flex';
            lucide.createIcons();
            gsap.fromTo(card, { y: 18, opacity: 0, scale: 0.98 }, { y: 0, opacity: 1, scale: 1, duration: 0.28, ease: 'power2.out' });
        }

        function hideLoginErrorModal() {
            const modal = document.getElementById('login-error-modal');
            if (modal.style.display === 'none') return;
            gsap.to('#login-error-card', {
                y: 10,
                opacity: 0,
                scale: 0.98,
                duration: 0.2,
                ease: 'power2.in',
                onComplete: () => {
                    modal.style.display = 'none';
                    gsap.set('#login-error-card', { clearProps: 'all' });
                }
            });
        }

        document.getElementById('login-error-ok').addEventListener('click', () => {
            hideLoginErrorModal();
            document.getElementById('login-password').focus();
        });

        document.getElementById('login-error-modal').addEventListener('click', (event) => {
            if (event.target.id === 'login-error-modal') {
                hideLoginErrorModal();
                document.getElementById('login-password').focus();
            }
        });

        function setGoogleHint(message, isError = false) {
            const hint = document.getElementById('google-login-hint');
            if (!hint) return;
            if (!message) {
                hint.classList.add('hidden');
                hint.textContent = '';
                return;
            }
            hint.textContent = message;
            hint.classList.remove('hidden');
            hint.classList.toggle('text-red-300', isError);
            hint.classList.toggle('text-slate-400', !isError);
        }

        async function initGoogleLogin(retries) {
            if (retries === undefined) retries = 10;
            try {
                const response = await fetch('/api/auth/google-config');
                const config = await response.json();

                if (!config.success || !config.enabled || !config.clientId) {
                    setGoogleHint('Đăng nhập Google hiện chưa được cấu hình trên máy chủ.');
                    return;
                }

                if (!config.googleAuthLibInstalled) {
                    setGoogleHint('Máy chủ chưa cài google-auth, chưa thể dùng đăng nhập Google.', true);
                    return;
                }

                if (!window.google || !window.google.accounts || !window.google.accounts.id) {
                    if (retries > 0) {
                        await new Promise(r => setTimeout(r, 500));
                        return initGoogleLogin(retries - 1);
                    }
                    setGoogleHint('Không tải được Google Sign-In. Vui lòng thử tải lại trang.', true);
                    return;
                }

                window.google.accounts.id.initialize({
                    client_id: config.clientId,
                    callback: handleGoogleCredential,
                    auto_select: false,
                    cancel_on_tap_outside: true
                });

                const btnHost = document.getElementById('google-signin-button');
                const width = Math.max(240, Math.min(360, (btnHost.clientWidth || 300)));

                window.google.accounts.id.renderButton(btnHost, {
                    theme: 'outline',
                    size: 'large',
                    shape: 'pill',
                    text: 'continue_with',
                    width
                });

                setGoogleHint('');
            } catch (err) {
                setGoogleHint('Không kết nối được máy chủ để khởi tạo đăng nhập Google.', true);
            }
        }

        async function handleGoogleCredential(response) {
            const idToken = (response && response.credential) ? response.credential : '';
            if (!idToken) {
                showLoginErrorModal('Không nhận được thông tin đăng nhập từ Google. Vui lòng thử lại.');
                return;
            }

            try {
                const loginRes = await fetch('/api/login/google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken })
                });
                const data = await loginRes.json();

                if (data.success) {
                    if (data.user) {
                        sessionStorage.setItem('fullname', data.user.fullname || '');
                        sessionStorage.setItem('email', data.user.email || '');
                        sessionStorage.setItem('role', data.user.role || 'user');
                        sessionStorage.setItem('avatar_url', data.user.avatar_url || '');
                    }
                    showSuccessToast(data.message, () => {
                        gsap.to('#auth-box', {
                            scale: 0.95, opacity: 0, duration: 0.4, ease: 'power2.in',
                            onComplete: () => {
                                window.location.href = '/';
                            }
                        });
                    });
                    return;
                }

                showLoginErrorModal(data.error || 'Đăng nhập Google thất bại. Vui lòng thử lại.');
            } catch (err) {
                showLoginErrorModal('Không thể kết nối đến máy chủ khi đăng nhập Google.');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if (!email || !password) {
                showLoginErrorModal('Vui lòng nhập đầy đủ email và mật khẩu để đăng nhập.');
                return;
            }
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (data.success) {
                    if (data.user) {
                        sessionStorage.setItem('fullname', data.user.fullname || '');
                        sessionStorage.setItem('email', data.user.email || email);
                        sessionStorage.setItem('role', data.user.role || 'user');
                        sessionStorage.setItem('avatar_url', data.user.avatar_url || '');
                    }
                    showSuccessToast(data.message, () => {
                        gsap.to("#auth-box", {
                            scale: 0.95, opacity: 0, duration: 0.4, ease: "power2.in",
                            onComplete: () => {
                                window.location.href = "/";
                            }
                        });
                    });
                } else {
                    showLoginErrorModal(data.error || 'Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng đăng nhập lại.');
                }
            } catch (err) {
                showLoginErrorModal('Không thể kết nối đến máy chủ. Vui lòng thử đăng nhập lại sau ít phút.');
            }
        }

        window.addEventListener('load', () => {
            // Google script is loaded async/defer, so wait until page is fully loaded.
            initGoogleLogin();
        });
    </script>
</body>
</html>
