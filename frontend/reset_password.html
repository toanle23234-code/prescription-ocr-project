<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Trợ Lý Y Tế AI</title>
    <link rel="icon" type="image/svg+xml" href="/frontend/brand/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Plus Jakarta Sans", sans-serif; background: #0f172a; color: white; overflow-x: hidden; min-height: 100vh; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.62); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .input-glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.12); color: white; transition: all 0.3s ease; }
        .input-glass:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); outline: none; }
    </style>
</head>
<body class="flex items-center justify-center">
    <div id="canvas-container"></div>
    <div class="absolute top-6 left-6 z-10">
        <a href="/login" class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span>Về đăng nhập</span>
        </a>
    </div>

    <div class="max-w-md w-full mx-4 glass-panel rounded-2xl shadow-2xl overflow-hidden relative z-10" id="reset-box">
        <div class="px-8 pt-8 pb-7">
            <div class="flex justify-center mb-6">
                <img src="/frontend/brand/favicon.svg" alt="Logo" class="w-16 h-16 rounded-2xl shadow-lg">
            </div>
            <h2 class="text-2xl font-bold text-center mb-2">Đặt lại mật khẩu</h2>
            <p class="text-slate-400 text-sm text-center mb-8">Tạo mật khẩu mới cho tài khoản của bạn</p>

            <form class="space-y-4" onsubmit="event.preventDefault(); handleResetPassword();">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Mật khẩu mới</label>
                    <div class="relative">
                        <i data-lucide="lock" class="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="password" id="new-password" class="w-full input-glass rounded-xl py-3 pl-10 pr-4" placeholder="Ít nhất 6 ký tự">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Nhập lại mật khẩu mới</label>
                    <div class="relative">
                        <i data-lucide="lock-keyhole" class="w-5 h-5 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="password" id="confirm-password" class="w-full input-glass rounded-xl py-3 pl-10 pr-4" placeholder="Nhập lại mật khẩu mới">
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 text-white font-medium py-3 rounded-xl transition-all shadow-lg shadow-indigo-500/25 mt-4 border border-indigo-300/20">
                    Cập nhật mật khẩu
                </button>
            </form>

            <p id="reset-message" class="hidden mt-5 text-sm rounded-xl px-4 py-3"></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        document.getElementById("canvas-container").appendChild(canvas);
        let width, height, particles;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = (Math.random() - 0.5) * 1;
                this.radius = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx = -this.vx;
                if (this.y < 0 || this.y > height) this.vy = -this.vy;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(99, 102, 241, 0.45)";
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const numParticles = Math.floor((width * height) / 15000);
            for (let i = 0; i < numParticles; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(99, 102, 241, ${1 - dist / 150})`;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            particles.forEach((p) => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function getToken() {
            const params = new URLSearchParams(window.location.search);
            return (params.get('token') || '').trim();
        }

        function showMessage(message, ok = true) {
            const box = document.getElementById('reset-message');
            box.textContent = message;
            box.classList.remove('hidden');
            box.className = ok
                ? 'mt-5 text-sm text-emerald-300 bg-emerald-500/10 border border-emerald-400/30 rounded-xl px-4 py-3'
                : 'mt-5 text-sm text-red-200 bg-red-500/10 border border-red-400/30 rounded-xl px-4 py-3';
        }

        async function handleResetPassword() {
            const token = getToken();
            const newPassword = document.getElementById('new-password').value || '';
            const confirmPassword = document.getElementById('confirm-password').value || '';

            if (!token) {
                showMessage('Liên kết đặt lại mật khẩu không hợp lệ.', false);
                return;
            }
            if (newPassword.length < 6) {
                showMessage('Mật khẩu mới cần ít nhất 6 ký tự.', false);
                return;
            }
            if (newPassword !== confirmPassword) {
                showMessage('Mật khẩu nhập lại không khớp.', false);
                return;
            }

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await response.json();
                if (!response.ok || !data.success) {
                    showMessage(data.error || 'Không thể đặt lại mật khẩu.', false);
                    return;
                }

                showMessage(data.message || 'Đặt lại mật khẩu thành công. Đang chuyển về đăng nhập...');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1200);
            } catch (err) {
                showMessage('Lỗi kết nối đến máy chủ. Vui lòng thử lại.', false);
            }
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
        gsap.from('#reset-box', { y: 30, opacity: 0, duration: 0.8, ease: 'power3.out' });
    </script>
</body>
</html>
